name: Build & Commit Dist

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'landing/**'

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    # Evita loop infinito: no corre si el commit fue generado por este mismo workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            landing/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build landing
        working-directory: landing
        run: npm run build

      - name: Commit dist artifacts to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # --force requerido: ambos .gitignore listan "dist"
          git add --force frontend/dist
          git add --force landing/dist

          if git diff --cached --quiet; then
            echo "No dist changes — skipping commit."
          else
            git commit -m "chore: build dist artifacts [skip ci]"
            git push origin main
          fi
